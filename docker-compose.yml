version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ummahbook_postgres
    environment:
      POSTGRES_USER: ummahbook
      POSTGRES_PASSWORD: ummahbook123
      POSTGRES_DB: ummahbook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ummahbook -d ummahbook_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
